<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9CB83A"/>
      <stop offset="100%" stop-color="#5C7B1A"/>
    </linearGradient>
  </defs>

  <!--
    Multi-lobed leaf body (hawthorn / oak silhouette).
    Traced clockwise from the stem tip, with alternating
    concave dips and convex lobe bumps around the perimeter.
  -->
  <path fill="url(#lg)" d="
    M 50 100
    L 47 91
    C 38 90, 28 84, 22 76
    C 26 76, 30 74, 32 70
    C 24 64, 18 54, 20 44
    C 22 48, 26 50, 28 48
    C 22 40, 22 28, 30 20
    C 30 24, 32 28, 34 28
    C 32 20, 36 12, 44 8
    C 44 12, 44 16, 46 18
    C 46 10, 48 4,  50 2
    C 52 4,  54 10, 54 18
    C 56 16, 56 12, 56 8
    C 64 12, 68 20, 66 28
    C 68 28, 70 24, 70 20
    C 78 28, 78 40, 72 48
    C 74 50, 78 48, 80 44
    C 82 54, 76 64, 68 70
    C 70 74, 74 76, 78 76
    C 72 84, 62 90, 53 91
    Z
  "/>

  <!-- Stem -->
  <rect x="47" y="96" width="6" height="12" rx="3" fill="#4A6A15"/>
</svg>